services:
  whisper-obsidian:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: whisper-obsidian
    environment:
      - MODEL=${MODEL:-small}
      - LANGUAGE=${LANGUAGE:-auto}
      - SCAN_PATHS=${SCAN_PATHS:-/vault}
    volumes:
      - ${VAULT_PATH}:/vault
      - whisper_models:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  whisper_models:
