name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src/

      - name: Test
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker env
        run: |
          mkdir -p /tmp/vault
          echo "VAULT_PATH=/tmp/vault" > docker/.env
          echo "CURRENT_UID=$(id -u)" >> docker/.env
          echo "CURRENT_GID=$(id -g)" >> docker/.env

      - name: Build Docker image
        run: docker compose -f docker/docker-compose.yml --env-file docker/.env build
